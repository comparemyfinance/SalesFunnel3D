name: Auto-merge Codex PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;

            // Configure a comma-separated allow-list in repository variable CODEX_AUTOMERGE_AUTHORS
            // Example: codex-bot,octocat
            const raw = process.env.CODEX_AUTOMERGE_AUTHORS || '';
            const allowedAuthors = new Set(
              raw
                .split(',')
                .map(s => s.trim())
                .filter(Boolean)
            );

            if (!allowedAuthors.size) {
              core.info('CODEX_AUTOMERGE_AUTHORS is not configured; skipping auto-merge.');
              return;
            }

            if (!allowedAuthors.has(pr.user.login)) return;
            if (pr.base.ref !== 'main') return;

            await github.graphql(`
              mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: SQUASH
                }) { pullRequest { number } }
              }
            `, { pullRequestId: pr.node_id });
        env:
          CODEX_AUTOMERGE_AUTHORS: ${{ vars.CODEX_AUTOMERGE_AUTHORS }}
