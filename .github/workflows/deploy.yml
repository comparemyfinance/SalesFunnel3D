name: Deploy to Google Apps Script

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gas-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLASPRC_JSON_B64: ${{ secrets.CLASPRC_JSON_B64 }}
      CLASP_SCRIPT_ID: ${{ secrets.CLASP_SCRIPT_ID }}
      GAS_DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required secrets
        run: |
          set -euo pipefail
          missing=0
          for key in CLASPRC_JSON_B64 CLASP_SCRIPT_ID GAS_DEPLOYMENT_ID; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install clasp
        run: npm install --global @google/clasp

      - name: Write clasp credentials
        run: |
          set -euo pipefail
          printf '%s' "$CLASPRC_JSON_B64" | base64 --decode > ~/.clasprc.json
          chmod 600 ~/.clasprc.json

      - name: Write .clasp.json
        run: |
          set -euo pipefail
          cat > .clasp.json <<EOF
          {"scriptId":"$CLASP_SCRIPT_ID","rootDir":"."}
          EOF

      - name: Show clasp status
        run: clasp status

      - name: Push project files
        run: clasp push --force

      - name: Create Apps Script version
        id: version
        run: |
          set -euo pipefail
          out=$(clasp version "CI $GITHUB_SHA")
          echo "$out"
          version_number=$(echo "$out" | sed -n 's/.*Created version \([0-9][0-9]*\).*/\1/p' | tail -n1)
          echo "version_number=$version_number" >> "$GITHUB_OUTPUT"

      - name: Redeploy existing web app deployment
        run: clasp deploy --deploymentId "$GAS_DEPLOYMENT_ID" --description "CI redeploy $GITHUB_SHA"

      - name: Deployment summary
        run: |
          {
            echo "### Google Apps Script deployment complete"
            echo "- Deployment ID: \`$GAS_DEPLOYMENT_ID\`"
            if [ -n "${{ steps.version.outputs.version_number }}" ]; then
              echo "- Version: \`${{ steps.version.outputs.version_number }}\`"
            fi
            echo "- Web app URL: https://script.google.com/macros/s/$GAS_DEPLOYMENT_ID/exec"
          } >> "$GITHUB_STEP_SUMMARY"
